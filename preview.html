<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1009" />
<title>Pool Odds — World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f1009; --ink2:#14160d; --panel:#1a1c12;
    --line:rgba(236,231,217,.10); --line2:rgba(236,231,217,.18);
    --parch:#ece7d9; --muted:#8d8a78;
    --amber:#f4b43c; --amber2:#ffcf6b; --sky:#79aecb;
    --track:#26281a;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--ink);
    color:var(--parch);
    font-family:'Archivo',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px 56px}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);
    display:flex;align-items:center;gap:8px}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);
    box-shadow:0 0 0 0 rgba(244,180,60,.6);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(244,180,60,.5)}70%{box-shadow:0 0 0 7px rgba(244,180,60,0)}100%{box-shadow:0 0 0 0 rgba(244,180,60,0)}}
  h1{font-weight:900;font-size:13px;letter-spacing:.04em;margin:14px 0 0;color:var(--parch);text-transform:uppercase}

  /* leader hero — the thesis: who's winning the pool right now */
  .lead{margin:18px 0 8px;padding:18px 18px 16px;border:1px solid var(--line2);border-radius:14px;
    background:linear-gradient(160deg,#1c1e12,#141509);position:relative;overflow:hidden}
  .lead:before{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 100% 0%,rgba(244,180,60,.14),transparent 60%)}
  .lead .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);position:relative}
  .lead .name{font-weight:900;font-size:32px;line-height:1.02;margin:6px 0 0;position:relative;letter-spacing:-.01em}
  .lead .big{font-family:'Space Mono',monospace;font-weight:700;font-size:46px;line-height:1;position:relative;
    color:var(--amber2);display:flex;align-items:baseline;gap:4px;margin-top:10px}
  .lead .big small{font-size:18px;color:var(--amber);font-weight:700}
  .lead .teams{position:relative;margin-top:12px}

  .board{margin-top:18px;border-top:1px solid var(--line)}
  .row{display:grid;grid-template-columns:1fr auto;gap:6px 12px;padding:15px 2px;border-bottom:1px solid var(--line);
    align-items:center;opacity:0;transform:translateY(6px);animation:rise .5s forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .who{display:flex;align-items:baseline;gap:10px;min-width:0}
  .rank{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);width:22px;flex:none}
  .nm{font-weight:800;font-size:17px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pct{font-family:'Space Mono',monospace;font-weight:700;font-size:22px;text-align:right;white-space:nowrap}
  .pct small{font-size:12px;color:var(--muted);margin-left:1px}
  .meta2{grid-column:1 / -1;display:flex;align-items:center;gap:12px}
  .track{flex:1;height:7px;background:var(--track);border-radius:6px;overflow:hidden}
  .fill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#b9842a,var(--amber2));
    transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .side{display:flex;align-items:center;gap:10px;flex:none}
  .delta{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;white-space:nowrap}
  .delta.up{color:var(--amber2)} .delta.down{color:var(--sky)} .delta.flat{color:var(--muted)}
  .spark{display:block}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;font-weight:600;color:var(--parch);background:rgba(236,231,217,.07);
    border:1px solid var(--line);border-radius:999px;padding:3px 9px;white-space:nowrap}
  .chip .tier{color:var(--muted);margin-right:5px;font-family:'Space Mono',monospace;font-size:9px}
  .chip .flag{margin-right:5px;font-size:13px;line-height:1}
  .avg{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;white-space:nowrap}

  footer{margin-top:26px;display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;
    font-size:11px;color:var(--muted);font-family:'Space Mono',monospace}
  footer b{color:var(--parch);font-weight:700}
  .pill{font-family:'Archivo';font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:#0f1009;background:var(--amber);border-radius:999px;padding:3px 9px}
  .state{padding:40px 8px;color:var(--muted);font-size:14px;line-height:1.6}
  .state b{color:var(--parch)}
  @media (prefers-reduced-motion: reduce){
    .row{animation:none;opacity:1;transform:none}
    .fill{transition:none}
    .eyebrow .dot{animation:none}
  }
</style>
</head>
<body>
<div id="root"></div>

<script>window.__PREVIEW__={"data": {"title": "The Group Chat Cup", "generatedAt": "2026-06-17T16:01:48+00:00", "nSims": 8000, "matchesPlayed": 7, "players": [{"name": "Pags", "teams": ["England", "Uruguay", "Qatar"], "flags": ["\ud83c\udff4\udb40\udc67\udb40\udc62\udb40\udc65\udb40\udc6e\udb40\udc67\udb40\udc7f", "\ud83c\uddfa\ud83c\uddfe", "\ud83c\uddf6\ud83c\udde6"], "winPct": 20.6, "avgPts": 25.5, "deltaPct": 3.8}, {"name": "Matt", "teams": ["Spain", "Mexico", "Cape Verde"], "flags": ["\ud83c\uddea\ud83c\uddf8", "\ud83c\uddf2\ud83c\uddfd", "\ud83c\udde8\ud83c\uddfb"], "winPct": 17.3, "avgPts": 24.7, "deltaPct": 0.4}, {"name": "Q", "teams": ["Brazil", "Croatia", "Curacao"], "flags": ["\ud83c\udde7\ud83c\uddf7", "\ud83c\udded\ud83c\uddf7", "\ud83c\udde8\ud83c\uddfc"], "winPct": 15.2, "avgPts": 23.7, "deltaPct": -0.1}, {"name": "Whitey", "teams": ["Netherlands", "South Korea", "Ghana"], "flags": ["\ud83c\uddf3\ud83c\uddf1", "\ud83c\uddf0\ud83c\uddf7", "\ud83c\uddec\ud83c\udded"], "winPct": 11.1, "avgPts": 23.1, "deltaPct": -1.2}, {"name": "Dre", "teams": ["France", "Japan", "Haiti"], "flags": ["\ud83c\uddeb\ud83c\uddf7", "\ud83c\uddef\ud83c\uddf5", "\ud83c\udded\ud83c\uddf9"], "winPct": 10.7, "avgPts": 22.9, "deltaPct": -1.6}, {"name": "Beans", "teams": ["Germany", "Colombia", "Jordan"], "flags": ["\ud83c\udde9\ud83c\uddea", "\ud83c\udde8\ud83c\uddf4", "\ud83c\uddef\ud83c\uddf4"], "winPct": 10.1, "avgPts": 22.9, "deltaPct": -0.6}, {"name": "Sully", "teams": ["Argentina", "Switzerland", "New Caledonia"], "flags": ["\ud83c\udde6\ud83c\uddf7", "\ud83c\udde8\ud83c\udded", "\ud83c\uddf3\ud83c\udde8"], "winPct": 7.6, "avgPts": 20.4, "deltaPct": -0.2}, {"name": "Tommy", "teams": ["Portugal", "Australia", "Egypt"], "flags": ["\ud83c\uddf5\ud83c\uddf9", "\ud83c\udde6\ud83c\uddfa", "\ud83c\uddea\ud83c\uddec"], "winPct": 7.5, "avgPts": 21.5, "deltaPct": -0.3}]}, "history": [{"t": "2026-06-17T16:01:37+00:00", "w": {"Matt": 18.1, "Sully": 16.2, "Pags": 14.1, "Q": 13.8, "Dre": 11.1, "Whitey": 10.6, "Beans": 8.6, "Tommy": 7.6}}, {"t": "2026-06-17T16:01:40+00:00", "w": {"Matt": 18.8, "Sully": 16.5, "Q": 14.3, "Pags": 13.2, "Whitey": 10.9, "Dre": 10.9, "Tommy": 7.8, "Beans": 7.5}}, {"t": "2026-06-17T16:01:44+00:00", "w": {"Matt": 16.9, "Pags": 16.8, "Q": 15.3, "Whitey": 12.3, "Dre": 12.3, "Beans": 10.7, "Tommy": 7.8, "Sully": 7.8}}, {"t": "2026-06-17T16:01:48+00:00", "w": {"Pags": 20.6, "Matt": 17.3, "Q": 15.2, "Whitey": 11.1, "Dre": 10.7, "Beans": 10.1, "Sully": 7.6, "Tommy": 7.5}}]};</script>
<script>
(function(){
  "use strict";
  const POOL_NAME = "World Cup Pool";
  const TIERS = ["TOP","MID","BOT"];
  const SAMPLE = { title:POOL_NAME, generatedAt:new Date().toISOString(), nSims:20000, matchesPlayed:0, sample:true,
    players:[
      {name:"Sample A",teams:["Spain","Mexico","Cape Verde"],flags:["\u{1F1EA}\u{1F1F8}","\u{1F1F2}\u{1F1FD}","\u{1F1E8}\u{1F1FB}"],winPct:21.4,avgPts:24.1,deltaPct:3.2},
      {name:"Sample B",teams:["France","Japan","Haiti"],flags:["\u{1F1EB}\u{1F1F7}","\u{1F1EF}\u{1F1F5}","\u{1F1ED}\u{1F1F9}"],winPct:17.9,avgPts:23.0,deltaPct:-1.4},
      {name:"Sample C",teams:["Brazil","Croatia","Curacao"],flags:["\u{1F1E7}\u{1F1F7}","\u{1F1ED}\u{1F1F7}","\u{1F1E8}\u{1F1FC}"],winPct:12.6,avgPts:21.2,deltaPct:0.8}
    ]};
  const RM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const NS = "http://www.w3.org/2000/svg";

  function el(tag, attrs, kids){
    const n = document.createElement(tag);
    if(attrs) for(const k in attrs){
      const v = attrs[k]; if(v==null) continue;
      if(k==="class") n.className=v;
      else if(k==="text") n.textContent=v;
      else if(k==="html") n.innerHTML=v;
      else if(k==="style") n.setAttribute("style",v);
      else n.setAttribute(k,v);
    }
    if(kids!=null){ (Array.isArray(kids)?kids:[kids]).forEach(function(c){
      if(c==null) return;
      n.appendChild(typeof c==="object"?c:document.createTextNode(String(c)));
    }); }
    return n;
  }
  function relTime(iso){
    const s=Math.max(0,(Date.now()-new Date(iso).getTime())/1000);
    if(s<60) return "just now";
    if(s<3600) return Math.round(s/60)+"m ago";
    if(s<86400) return Math.round(s/3600)+"h ago";
    return Math.round(s/86400)+"d ago";
  }
  function deltaEl(d){
    if(Math.abs(d)<0.05) return el("span",{class:"delta flat",text:"\u2014"});
    const up=d>0;
    return el("span",{class:"delta "+(up?"up":"down"),text:(up?"\u25B2":"\u25BC")+" "+Math.abs(d).toFixed(1)});
  }
  function chips(teams,flags){
    const wrap=el("div",{class:"chips"});
    teams.forEach(function(t,i){
      const c=el("span",{class:"chip"});
      if(flags && flags[i]) c.appendChild(el("span",{class:"flag",text:flags[i]}));
      else c.appendChild(el("span",{class:"tier",text:TIERS[i]||""}));
      c.appendChild(document.createTextNode(t));
      wrap.appendChild(c);
    });
    return wrap;
  }
  function spark(pts){
    if(!pts||pts.length<2) return null;
    const w=56,h=18,lo=Math.min.apply(null,pts),hi=Math.max.apply(null,pts),rng=(hi-lo)||1;
    const d=pts.map(function(p,i){return (i/(pts.length-1))*w+","+(h-((p-lo)/rng)*(h-2)-1);}).join(" ");
    const up=pts[pts.length-1]>=pts[0];
    const svg=document.createElementNS(NS,"svg");
    svg.setAttribute("class","spark"); svg.setAttribute("width",w); svg.setAttribute("height",h);
    svg.setAttribute("viewBox","0 0 "+w+" "+h);
    const pl=document.createElementNS(NS,"polyline");
    pl.setAttribute("points",d); pl.setAttribute("fill","none");
    pl.setAttribute("stroke",up?"var(--amber)":"var(--sky)");
    pl.setAttribute("stroke-width","1.5"); pl.setAttribute("stroke-linejoin","round");
    pl.setAttribute("stroke-linecap","round"); pl.setAttribute("opacity","0.85");
    svg.appendChild(pl); return svg;
  }
  function countUp(textNode, target){
    if(RM){ textNode.nodeValue=target.toFixed(1); return; }
    const ms=900; let start=null;
    function step(t){ start=start||t; const p=Math.min(1,(t-start)/ms);
      textNode.nodeValue=(target*(1-Math.pow(1-p,3))).toFixed(1);
      if(p<1) requestAnimationFrame(step); }
    requestAnimationFrame(step);
  }
  function buildHist(arr){
    const m={}; (arr||[]).forEach(function(s){ const w=s.w||{}; for(const nm in w){ (m[nm]=m[nm]||[]).push(w[nm]); } }); return m;
  }

  function render(data, histMap){
    const root=document.getElementById("root"); root.textContent="";
    const players=data.players, leader=players[0];
    const max=Math.max.apply(null, players.map(function(p){return p.winPct;}).concat([1]));
    const wrap=el("div",{class:"wrap"});

    const eb=el("div",{class:"eyebrow"});
    eb.appendChild(el("span",{class:"dot"}));
    eb.appendChild(document.createTextNode("FIFA World Cup 2026 \u00B7 Live Odds"));
    wrap.appendChild(eb);
    wrap.appendChild(el("h1",{text:(data.title||POOL_NAME)+" \u2014 chance of winning"}));

    const lead=el("div",{class:"lead"});
    lead.appendChild(el("div",{class:"lbl",text:"Leading"}));
    lead.appendChild(el("div",{class:"name",text:leader.name}));
    const big=el("div",{class:"big"});
    const leadNum=document.createTextNode(RM?leader.winPct.toFixed(1):"0.0");
    big.appendChild(leadNum); big.appendChild(el("small",{text:"%"}));
    const dWrap=el("span",{style:"margin-left:auto"}); dWrap.appendChild(deltaEl(leader.deltaPct));
    big.appendChild(dWrap); lead.appendChild(big);
    const tw=el("div",{class:"teams"}); tw.appendChild(chips(leader.teams,leader.flags)); lead.appendChild(tw);
    wrap.appendChild(lead);

    const board=el("div",{class:"board"});
    const fills=[], nums=[];
    players.forEach(function(p,i){
      const row=el("div",{class:"row",style:"animation-delay:"+(i*55)+"ms"});
      const who=el("div",{class:"who"});
      who.appendChild(el("span",{class:"rank",text:String(i+1).padStart(2,"0")}));
      who.appendChild(el("span",{class:"nm",text:p.name}));
      row.appendChild(who);
      const pct=el("div",{class:"pct"});
      const pn=document.createTextNode(RM?p.winPct.toFixed(1):"0.0");
      pct.appendChild(pn); pct.appendChild(el("small",{text:"%"}));
      row.appendChild(pct); nums.push([pn,p.winPct]);
      const m1=el("div",{class:"meta2"}); m1.appendChild(chips(p.teams,p.flags)); row.appendChild(m1);
      const m2=el("div",{class:"meta2"});
      const track=el("div",{class:"track"}); const fill=el("div",{class:"fill"}); track.appendChild(fill);
      m2.appendChild(track); fills.push([fill,100*p.winPct/max]);
      const side=el("div",{class:"side"});
      const sp=spark(histMap[p.name]); if(sp) side.appendChild(sp);
      side.appendChild(deltaEl(p.deltaPct));
      side.appendChild(el("span",{class:"avg",text:p.avgPts.toFixed(1)+"p"}));
      m2.appendChild(side); row.appendChild(m2);
      board.appendChild(row);
    });
    wrap.appendChild(board);

    const f=el("footer");
    if(data.sample) f.appendChild(el("span",{class:"pill",text:"Preview \u00B7 run the sim to go live"}));
    f.appendChild(el("span",{html:"Updated <b>"+relTime(data.generatedAt)+"</b>"}));
    f.appendChild(el("span",{html:"<b>"+data.nSims.toLocaleString()+"</b> sims"}));
    f.appendChild(el("span",{html:"<b>"+data.matchesPlayed+"</b> matches in"}));
    f.appendChild(el("span",{style:"color:rgba(236,231,217,.35)",text:"\u0394 vs last update"}));
    wrap.appendChild(f);

    root.appendChild(wrap);
    nums.push([leadNum,leader.winPct]);
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      fills.forEach(function(x){ x[0].style.width=x[1]+"%"; });
    }); });
    nums.forEach(function(x){ countUp(x[0],x[1]); });
  }

  if(window.__PREVIEW__){ render(window.__PREVIEW__.data, buildHist(window.__PREVIEW__.history)); }
  else {
    const cb="?cb="+Date.now();
    fetch("results.json"+cb).then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(d){
        fetch("history.json"+cb).then(function(r){return r.ok?r.json():[];}).catch(function(){return [];})
          .then(function(h){ render(d, buildHist(h)); });
      })
      .catch(function(){ render(SAMPLE, {}); });
  }
})();
</script>
</body>
</html>
