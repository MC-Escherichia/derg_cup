<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Pool — Live Probabilities</title>

  <!-- React (no build step: CDN UMD + Babel standalone for JSX) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <style>
    :root {
      --brand: #1e3c72;
      --brand-light: #2a5298;
      --up: #22c55e;
      --down: #ef4444;
      --muted: #999;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-light) 100%);
      color: #333;
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    .container { max-width: 1200px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 1.5rem; color: white; }
    h1 { font-size: 2.2rem; margin-bottom: 0.4rem; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
    .subtitle { font-size: 1rem; opacity: 0.9; margin-bottom: 0.5rem; }

    .meta {
      font-size: 0.85rem;
      opacity: 0.85;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 0.75rem;
      justify-content: center;
    }
    .meta span { white-space: nowrap; }

    .standings {
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* ---- Controls bar (sparkline scale toggle) ---- */
    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.6rem;
      margin-bottom: 0.75rem;
      color: white;
      flex-wrap: wrap;
    }
    .controls-label {
      font-size: 0.85rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .toggle {
      display: inline-flex;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 0.2rem;
    }
    .toggle-btn {
      border: none;
      background: transparent;
      color: white;
      font: inherit;
      font-size: 0.85rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.active {
      background: white;
      color: var(--brand);
      font-weight: 600;
    }
    .toggle-btn:focus-visible { outline: 2px solid white; outline-offset: 2px; }

    /* ---- Player row: desktop grid, mobile stacked card ---- */
    .player-row {
      display: grid;
      grid-template-columns: 2.5rem minmax(0, 1fr) 130px auto;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #eee;
      transition: background 0.2s;
    }
    .player-row:hover { background: #f8f9fa; }
    .player-row:last-child { border-bottom: none; }

    .rank { font-size: 1.5rem; font-weight: bold; color: var(--brand); text-align: center; }

    .player-info { min-width: 0; }
    .player-name { font-size: 1.1rem; font-weight: 600; color: #222; margin-bottom: 0.4rem; }

    .teams { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .team-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      background: #f0f0f0; padding: 0.25rem 0.6rem;
      border-radius: 16px; font-size: 0.82rem; color: #555;
    }
    .team-flag { font-size: 1.05rem; }

    .sparkline { width: 100%; }
    .sparkline svg { width: 100%; height: 44px; display: block; }

    .stats {
      display: flex;
      gap: 1.5rem;
      justify-content: flex-end;
      align-items: center;
    }

    .stat { text-align: center; }
    .stat-label {
      font-size: 0.72rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.2rem;
    }
    .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--brand); }
    .stat-value.big { font-size: 2rem; }
    .stat-secondary { font-size: 0.8rem; color: #666; margin-top: 0.15rem; }

    .delta-up { color: var(--up); }
    .delta-down { color: var(--down); }
    .delta-neutral { color: var(--muted); }

    .loading, .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 1.1rem; }
    .loading-screen { color: white; }

    .error {
      background: #fee2e2; color: #991b1b;
      padding: 1rem; border-radius: 8px; margin-bottom: 1rem;
    }

    /* ---------- Tablet ---------- */
    @media (max-width: 1024px) {
      .player-row { grid-template-columns: 2.5rem minmax(0, 1fr) 110px auto; gap: 1rem; }
      .stats { gap: 1rem; }
      .stat-value.big { font-size: 1.6rem; }
    }

    /* ---------- Mobile: stacked card layout ---------- */
    @media (max-width: 680px) {
      body { padding: 1rem 0.6rem; }
      h1 { font-size: 1.7rem; }

      .controls { justify-content: center; }

      .player-row {
        grid-template-columns: auto 1fr auto;
        grid-template-areas:
          "rank name win"
          "spark spark spark"
          "stats stats stats";
        gap: 0.6rem 0.75rem;
        padding: 1rem;
      }

      .rank { grid-area: rank; font-size: 1.3rem; align-self: center; }
      .player-info { grid-area: name; align-self: center; }
      .player-name { margin-bottom: 0.35rem; }

      .win-prob-cell {
        grid-area: win;
        text-align: right;
        align-self: center;
      }

      .sparkline { grid-area: spark; }

      .stats {
        grid-area: stats;
        justify-content: space-between;
        gap: 0.5rem;
        padding-top: 0.5rem;
        border-top: 1px solid #f0f0f0;
      }
      /* On mobile the win % lives in its own header cell, hide the duplicate stat */
      .stats .win-prob-cell { display: none; }
      .stat { flex: 1; }
      .stat-value.big { font-size: 1.3rem; }
    }

    /* On desktop/tablet the header win cell is hidden; win% shows inside .stats */
    @media (min-width: 681px) {
      .win-prob-header { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback } = React;

    const SPARK_W = 100;
    const SPARK_H = 44;
    const SPARK_PAD = 3;

    // Build a sparkline. "global" mode uses a fixed 0–100 win-% scale so every
    // player is comparable; "perPlayer" mode auto-scales to each player's own
    // min/max so small swings stay legible.
    function Sparkline({ player, history, scaleMode }) {
      const series = (history || [])
        .map(h => (h.w && typeof h.w[player] === "number") ? h.w[player] : null)
        .filter(v => v !== null);

      // A unique, CSS/SVG-safe id (player names contain "&", spaces, etc.).
      const safeId = "spark-" + player.replace(/[^a-zA-Z0-9]/g, "-");

      if (series.length === 0) {
        return <div className="sparkline"><svg viewBox={`0 0 ${SPARK_W} ${SPARK_H}`} /></div>;
      }

      const usable = SPARK_H - SPARK_PAD * 2;
      let lo = 0, hi = 100;
      if (scaleMode === "perPlayer") {
        lo = Math.min(...series);
        hi = Math.max(...series);
        if (hi === lo) { lo -= 0.5; hi += 0.5; } // flat series: center the line
      }
      const range = hi - lo;
      const yFor = v => SPARK_H - SPARK_PAD - ((Math.max(lo, Math.min(hi, v)) - lo) / range) * usable;

      // Single data point: render a flat segment so there is still something to see.
      const pts = series.length === 1
        ? [{ x: SPARK_PAD, y: yFor(series[0]) }, { x: SPARK_W - SPARK_PAD, y: yFor(series[0]) }]
        : series.map((v, i) => ({
            x: SPARK_PAD + i * ((SPARK_W - SPARK_PAD * 2) / (series.length - 1)),
            y: yFor(v),
          }));

      const line = pts.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`).join(" ");
      const last = pts[pts.length - 1];
      const area = `${line} L ${last.x.toFixed(2)} ${SPARK_H} L ${SPARK_PAD} ${SPARK_H} Z`;

      return (
        <div className="sparkline">
          <svg viewBox={`0 0 ${SPARK_W} ${SPARK_H}`} preserveAspectRatio="none"
               role="img" aria-label={`Win probability trend for ${player}`}>
            <defs>
              <linearGradient id={safeId} x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="var(--brand-light)" stopOpacity="0.3" />
                <stop offset="100%" stopColor="var(--brand-light)" stopOpacity="0" />
              </linearGradient>
            </defs>
            <path d={area} fill={`url(#${safeId})`} />
            <path d={line} stroke="var(--brand-light)" strokeWidth="1.5" fill="none"
                  vectorEffect="non-scaling-stroke" />
            <circle cx={last.x} cy={last.y} r="2.2" fill="var(--brand)" />
          </svg>
        </div>
      );
    }

    function WinProb({ value, className }) {
      return (
        <div className={"win-prob-cell stat " + (className || "")}>
          <div className="stat-label">Win %</div>
          <div className="stat-value big">{value.toFixed(1)}%</div>
        </div>
      );
    }

    function PlayerRow({ player, rank, history, scaleMode }) {
      const d = player.deltaPct;
      const deltaClass = d > 0 ? "delta-up" : d < 0 ? "delta-down" : "delta-neutral";
      const deltaSymbol = d > 0 ? "📈" : d < 0 ? "📉" : "➡️";
      const sign = d > 0 ? "+" : "";

      return (
        <div className="player-row">
          <div className="rank">{rank}</div>

          <div className="player-info">
            <div className="player-name">{player.name}</div>
            <div className="teams">
              {player.teams.map((team, i) => (
                <span className="team-badge" key={team + i}>
                  <span className="team-flag">{player.flags[i] || "🏳️"}</span>
                  <span>{team}</span>
                </span>
              ))}
            </div>
          </div>

          {/* Mobile-only header win % (top-right of card) */}
          <WinProb value={player.winPct} className="win-prob-header" />

          <Sparkline player={player.name} history={history} scaleMode={scaleMode} />

          <div className="stats">
            <WinProb value={player.winPct} />
            <div className="stat">
              <div className="stat-label">Current</div>
              <div className="stat-value">{player.currentPts}</div>
              <div className="stat-secondary">{player.currentGd > 0 ? "+" : ""}{player.currentGd}</div>
            </div>
            <div className="stat">
              <div className="stat-label">Avg</div>
              <div className="stat-value">{player.avgPts.toFixed(1)}</div>
              <div className="stat-secondary">{player.avgGd > 0 ? "+" : ""}{player.avgGd.toFixed(1)}</div>
            </div>
            <div className="stat">
              <div className="stat-label">Change</div>
              <div className={"stat-value stat-delta " + deltaClass}>
                {deltaSymbol} {sign}{d.toFixed(1)}%
              </div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [results, setResults] = useState(null);
      const [history, setHistory] = useState([]);
      const [error, setError] = useState(null);
      // Sparkline y-axis: "global" (0–100) or "perPlayer" (auto-scaled). Remembered.
      const [scaleMode, setScaleMode] = useState(
        () => localStorage.getItem("sparkScale") || "global"
      );

      useEffect(() => { localStorage.setItem("sparkScale", scaleMode); }, [scaleMode]);

      const load = useCallback(async () => {
        try {
          // Cache-bust so GitHub Pages' CDN can't serve a stale data file.
          const bust = `?t=${Date.now()}`;
          const [resultsRes, historyRes] = await Promise.all([
            fetch("results.json" + bust),
            fetch("history.json" + bust),
          ]);
          if (!resultsRes.ok) throw new Error("Failed to load results.json");

          const resultsData = await resultsRes.json();
          // History is best-effort; an empty/missing file just hides the trend.
          let historyData = [];
          if (historyRes.ok) {
            try { historyData = await historyRes.json(); } catch (_) { historyData = []; }
          }

          setResults(resultsData);
          setHistory(Array.isArray(historyData) ? historyData : []);
          setError(null);
        } catch (err) {
          console.error(err);
          setError(err.message);
        }
      }, []);

      useEffect(() => {
        load();
        const id = setInterval(load, 5 * 60 * 1000); // refresh every 5 min
        return () => clearInterval(id);
      }, [load]);

      const title = results?.title || "World Cup Pool";
      const players = results?.players || [];

      return (
        <div className="container">
          <header>
            <h1>⚽ {title}</h1>
            <div className="subtitle">Live Win Probability Tracker</div>
            <div className="meta">
              <span>Matches played: {results ? results.matchesPlayed : "—"}</span>
              <span>•</span>
              <span>
                Last updated: {results ? new Date(results.generatedAt).toLocaleString() : "—"}
              </span>
              <span>•</span>
              <span>{results ? results.nSims.toLocaleString() : "—"} simulations</span>
            </div>
          </header>

          {error && (
            <div className="error">
              <strong>Error:</strong> {error}. Make sure results.json exists in this directory.
            </div>
          )}

          <div className="controls">
            <span className="controls-label">Sparkline scale</span>
            <div className="toggle" role="group" aria-label="Sparkline scale">
              <button
                type="button"
                className={"toggle-btn" + (scaleMode === "global" ? " active" : "")}
                aria-pressed={scaleMode === "global"}
                onClick={() => setScaleMode("global")}
              >
                Global 0–100
              </button>
              <button
                type="button"
                className={"toggle-btn" + (scaleMode === "perPlayer" ? " active" : "")}
                aria-pressed={scaleMode === "perPlayer"}
                onClick={() => setScaleMode("perPlayer")}
              >
                Per player
              </button>
            </div>
          </div>

          <div className="standings">
            {!results && !error && <div className="loading loading-screen">Loading standings…</div>}
            {results && players.length === 0 && <div className="empty">No player data available.</div>}
            {players.map((p, i) => (
              <PlayerRow key={p.name} player={p} rank={i + 1} history={history} scaleMode={scaleMode} />
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
